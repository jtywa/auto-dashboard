<div class="container">
  <div class="metrics">
    <div class="card">
      <div class="card-label">Total Vehicles</div>
      <div class="card-number">{{ workOrders.length }}</div>
    </div>
    <div class="card">
      <div class="card-label">Waiting</div>
      <div class="card-number">{{ waitingCount }}</div>
    </div>
    <div class="card">
      <div class="card-label">In Progress</div>
      <div class="card-number">{{ inProgressCount }}</div>
    </div>
    <div class="card">
      <div class="card-label">Completed</div>
      <div class="card-number">{{ completedCount }}</div>
    </div>
    <div class="card">
      <div class="card-label">Hours Backlog</div>
      <div class="card-number">{{ totalEstimatedHours }}</div>
    </div>
    <div class="card">
      <!-- TODO: make this dynamic -->
      <div class="card-label">My Active Jobs</div>
      <div class="card-number">1</div>
    </div>
  </div>

  <div>
    <div class="title">
      <div>ACTIVE QUEUE</div>
      <div>4 jobs</div>
    </div>
    <div class="module">
      <div class="filters">
        <button class="button-active">All active</button>
        <button>Waiting</button>
        <button>In progress</button>
        <button>Done</button>
      </div>
      @for (order of workOrders; track order.id) {
        <app-service-card [order]="order" />
      }
    </div>
  </div>

  @if (uiState.showCheckIn()) {
    <app-checkin-modal />
  }
</div>
